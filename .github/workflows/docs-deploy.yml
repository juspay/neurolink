name: Deploy Documentation

on:
  workflow_dispatch:
  push:
    branches: [main, release]
    paths:
      - "docs-site/**"
      - "docs/**"
      - ".github/workflows/docs-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: docs-site

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore Docusaurus cache
        uses: actions/cache@v4
        with:
          path: |
            docs-site/.docusaurus
            docs-site/node_modules/.cache
          key: ${{ runner.os }}-docusaurus-${{ hashFiles('docs-site/pnpm-lock.yaml') }}-${{ hashFiles('docs-site/**/*.{ts,tsx,mdx,css}') }}
          restore-keys: |
            ${{ runner.os }}-docusaurus-${{ hashFiles('docs-site/pnpm-lock.yaml') }}-
            ${{ runner.os }}-docusaurus-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync docs content
        run: pnpm run sync-docs

      - name: Build LLMs.txt
        run: pnpm run build:llms-txt

      - name: Build documentation
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_SEARCH_API_KEY: ${{ secrets.ALGOLIA_SEARCH_API_KEY }}
          GA_TRACKING_ID: ${{ secrets.GA_TRACKING_ID }}

      - name: Push search index to Algolia
        if: ${{ env.ALGOLIA_APP_ID != '' && env.ALGOLIA_ADMIN_API_KEY != '' }}
        run: node scripts/push-algolia-index.js
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
