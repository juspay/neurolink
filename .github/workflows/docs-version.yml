name: Documentation Versioning

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "20"

jobs:
  version-docs:
    name: Create Documentation Version
    runs-on: ubuntu-latest
    # Only run for minor/major releases (tag ends with '.0')
    if: endsWith(github.event.release.tag_name, '.0')
    defaults:
      run:
        working-directory: docs-site

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Restore Docusaurus cache
        uses: actions/cache@v4
        with:
          path: |
            docs-site/.docusaurus
            docs-site/node_modules/.cache
          key: ${{ runner.os }}-docusaurus-${{ hashFiles('docs-site/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-docusaurus-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync docs content
        run: pnpm run sync-docs

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Remove 'v' prefix if present
          VERSION="${TAG#v}"
          # Extract major.minor (e.g., "8.39.0" -> "8.39")
          DOC_VERSION=$(echo "$VERSION" | sed 's/\.[^.]*$//')
          echo "version=$DOC_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted documentation version: $DOC_VERSION"

      - name: Check if version already exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f versions.json ] && grep -q "\"$VERSION\"" versions.json; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists in versions.json"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION does not exist yet"
          fi

      - name: Create documentation version
        if: steps.check.outputs.exists != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Creating documentation version: $VERSION"
          pnpm exec docusaurus docs:version "$VERSION"

      - name: Create Pull Request
        if: steps.check.outputs.exists != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # Use DOCS_BOT_TOKEN (PAT) instead of GITHUB_TOKEN to trigger downstream workflows
          # GITHUB_TOKEN cannot trigger other workflows due to GitHub security restrictions
          # NOTE: DOCS_BOT_TOKEN must be set up as a repository secret in GitHub Settings > Secrets and variables > Actions
          # Create a Personal Access Token (PAT) with 'repo' and 'workflow' scopes and add it as DOCS_BOT_TOKEN
          token: ${{ secrets.DOCS_BOT_TOKEN }}
          commit-message: "docs: add documentation version ${{ steps.version.outputs.version }}"
          title: "docs: add documentation version ${{ steps.version.outputs.version }}"
          body: |
            ## Documentation Version Update

            This PR adds versioned documentation for release **${{ github.event.release.tag_name }}**.

            ### Changes
            - Created versioned docs in `versioned_docs/version-${{ steps.version.outputs.version }}/`
            - Created versioned sidebar in `versioned_sidebars/version-${{ steps.version.outputs.version }}-sidebars.json`
            - Updated `versions.json`

            ### Release Information
            - **Tag**: ${{ github.event.release.tag_name }}
            - **Documentation Version**: ${{ steps.version.outputs.version }}
            - **Release URL**: ${{ github.event.release.html_url }}

            ---

            *This PR was automatically created by the Documentation Versioning workflow.*
          branch: docs/version-${{ steps.version.outputs.version }}
          base: release
          add-paths: |
            docs-site/versioned_docs/
            docs-site/versioned_sidebars/
            docs-site/versions.json
          labels: |
            documentation
            automated
          reviewers: |
            ${{ github.event.release.author.login }}
