# =============================================================================
# Yama PR Review configuration for NeuroLink
# =============================================================================
# Consumed by the @juspay/yama GitHub Action (see
# .github/workflows/yama-review.yml). Auto-discovered from the repo root by
# Yama's ConfigLoader (search order: yama.config.yaml → config/yama.config.yaml
# → .yama/config.yaml); also passed explicitly via the action `config-path`.
#
# WHERE THE REVIEW RULES COME FROM
#   Yama's RulesContextLoader automatically loads, from this repo root:
#     • CLAUDE.md       — the authoritative engineering rules for this repo
#     • CONTRIBUTING.md — contribution + commit conventions
#   and injects them into the reviewer as <project-rules>. This file does NOT
#   restate those rules — it tunes WHAT the reviewer focuses on, WHAT blocks a
#   merge, and points the reviewer back at CLAUDE.md as the source of truth.
#
# PROVIDER / MODEL ARE INTENTIONALLY NOT SET HERE
#   The AI provider, model and all credentials are controlled by the workflow
#   inputs (ai-provider / ai-model / litellm-*), which the action exposes as
#   AI_PROVIDER / AI_MODEL / AI_EXPLORE_* env vars. Yama merges this file OVER
#   those env vars, so setting ai.provider/ai.model here would silently override
#   the workflow. Leave them out.
# =============================================================================

version: 2
configType: "yama"

display:
  showBanner: false
  streamingMode: false
  verboseToolCalls: false
  showAIThinking: false

ai:
  # provider/model OMITTED on purpose — see header note. Controlled by the
  # workflow (litellm / private-large) via AI_PROVIDER / AI_MODEL env.
  temperature: 0.2 # deterministic, review-grade output
  # Cap review-generation OUTPUT tokens. @juspay/yama's default ai.maxTokens is
  # 128000 (DefaultConfig.ts); on the private-large model (262144 ctx) that
  # leaves only ~134K for INPUT, so medium/large PRs (diff + explored context +
  # project rules) exceed the window and LiteLLM rejects the call with a 400
  # ("input_tokens > maximum input length"). A review never emits anywhere near
  # 128K output tokens, so cap it at 16000 — this raises the usable input
  # ceiling to ~246K and lets large diffs be reviewed. (The explore worker
  # defaults to 32000, which is unaffected.)
  maxTokens: 16000
  timeout: "15m"
  retryAttempts: 3
  enableAnalytics: true
  enableEvaluation: false

  conversationMemory:
    enabled: true
    store: "memory"
    maxSessions: 50
    maxTurnsPerSession: 300
    enableSummarization: false

  # The explore worker reads project rules (CLAUDE.md/CONTRIBUTING.md) and
  # codebase context. MUST stay enabled so the reviewer sees this repo's rules.
  # provider/model also OMITTED — set via AI_EXPLORE_* env from the action.
  explore:
    enabled: true
    timeout: "5m"
    cacheResults: true

# -----------------------------------------------------------------------------
# MCP servers — GitHub only. Jira/Bitbucket off so no extra credentials are
# required. Repo-mutating GitHub tools are already blocked by Yama's built-in
# denylist; this is a read + review-comment workflow.
# -----------------------------------------------------------------------------
mcpServers:
  github:
    enabled: true
    # transport defaults to "http" (hosted GitHub MCP at api.githubcopilot.com).
  jira:
    enabled: false

# -----------------------------------------------------------------------------
# Review behaviour
# -----------------------------------------------------------------------------
review:
  enabled: true

  workflowInstructions: |
    You are reviewing a pull request for NeuroLink (a unified AI SDK + CLI
    wrapping 20+ providers). Treat the <project-rules> block (this repo's
    CLAUDE.md and CONTRIBUTING.md) as the AUTHORITATIVE ruleset — when you flag
    something that violates it, cite the specific CLAUDE.md rule (e.g. "Critical
    Rule 1: dynamic imports only in registry").

    Division of labour with existing CI — do NOT duplicate it:
      • Formatting/lint/type errors and CLAUDE.md rules 2 & 7–13 are already
        enforced by ESLint + Prettier + tsc in the CI workflow and by the custom
        AST rules in eslint-rules/. Do not re-report those mechanical violations.
      • Focus your effort on what static analysis CANNOT catch: logic/correctness
        bugs, security issues, broken backward compatibility of the public SDK
        API, architectural rule violations, missing error handling, missing
        tests for new behaviour, and risky provider/MCP/streaming changes.

    Be specific and constructive: every comment should reference the exact
    file+line, explain the concrete risk, and (where useful) suggest a fix.
    Only request changes or block per <blocking-criteria>; otherwise leave the
    issue as an inline comment and approve.

  # Focus areas in priority order (comment-level guidance; see blockingCriteria
  # for what actually fails the required check).
  focusAreas:
    - name: "Security"
      priority: "CRITICAL"
      description: |
        - Hardcoded secrets, API keys, tokens or credentials in source
        - Secrets leaking into logs — confirm transformParamsForLogging / secret
          stripping is used before logging provider params
        - Injection (command/SQL/template), unsafe eval / innerHTML / dynamic
          require, SSRF, path traversal
        - Unsafe handling of user/model input, missing validation/sanitization

    - name: "Architecture & CLAUDE.md Critical Rules"
      priority: "MAJOR"
      description: |
        Rules NOT enforced by ESLint — verify by reading the change:
        - Rule 1: providers loaded via DYNAMIC imports inside providerRegistry
          factory functions only (static imports cause circular deps)
        - Rule 3: Gemini (Google AI Studio / Vertex) cannot use tools AND a
          JSON-schema structuredOutput at the same time
        - Rule 4: CLI-only concerns (manual MCP connections) must not leak into
          the SDK path
        - Rule 5: public SDK API stays backward compatible — no breaking changes
          to existing callers without a documented migration
        - Rule 6: formatProviderError must RETURN the error, never throw
        - Streaming: provider executeStream must go through BaseProvider.stream()
          tool-merge (options.tools || getAllTools()), not bypass it

    - name: "Type Safety & Correctness"
      priority: "MAJOR"
      description: |
        - No `any` / `as any` / `@ts-ignore` / non-null `!` papering over real
          type problems; proper null/undefined handling
        - Logic bugs, off-by-one, unhandled promise rejections, races
        - Error handling via ErrorFactory typed errors; async wrapped in
          withTimeout where external calls are made
        - Expensive debug serialization guarded by logger.shouldLog("debug")

    - name: "Performance"
      priority: "MINOR"
      description: |
        - N+1 / redundant network or DB calls, blocking I/O in async paths
        - Memory leaks, unbounded caches, avoidable O(n^2) work on hot paths

    - name: "Testing & Documentation"
      priority: "MINOR"
      description: |
        - New providers/processors/features have tests in the matching
          test/continuous-test-suite-*.ts
        - Public behaviour changes are reflected in docs / type docs

  # Blocking criteria — ONLY these escalate the AI decision to BLOCKED, which
  # makes the required "Yama PR Review" check fail and prevents merge. Everything
  # else is posted as an advisory inline comment.
  blockingCriteria:
    - condition: "Any hardcoded secret, API key, token, password or credential committed in source (non-test, non-example)"
      action: "BLOCK"
      reason: "Security: secrets must never be committed"
    - condition: "Any CRITICAL severity security vulnerability (injection, auth bypass, SSRF, unsafe eval/innerHTML, secret or PII exposure)"
      action: "BLOCK"
      reason: "Critical security risk"
    - condition: "A change that breaks backward compatibility of the public SDK API without a documented migration path"
      action: "BLOCK"
      reason: "CLAUDE.md Critical Rule 5: public SDK API must not break existing callers"
    - condition: "A violation of a non-negotiable CLAUDE.md Critical Rule that ESLint does NOT catch (e.g. static provider import outside the registry; Gemini tools + JSON schema used together; formatProviderError throwing instead of returning)"
      action: "BLOCK"
      reason: "Violates a documented non-negotiable architectural rule"
    - condition: "3 or more MAJOR severity issues in the same pull request"
      action: "BLOCK"
      reason: "Too many significant issues to merge safely"

  # Generated / vendored / binary files are skipped.
  excludePatterns:
    - "*.lock"
    - "pnpm-lock.yaml"
    - "package-lock.json"
    - "yarn.lock"
    - "*.min.js"
    - "*.map"
    - "*.svg"
    - "dist/**"
    - "build/**"
    - "coverage/**"
    - "docs/.vitepress/cache/**"

  contextLines: 3
  maxFilesPerReview: 100
  fileAnalysisTimeout: "2m"

  toolPreferences:
    lazyLoading: true
    cacheToolResults: true
    parallelToolCalls: false
    maxToolCallsPerFile: 20
    enableCodeSearch: true
    enableDirectoryListing: true

# -----------------------------------------------------------------------------
# Review-only mode: never rewrite PR descriptions (also enforced by the action
# input skip-description-enhance: "true").
# -----------------------------------------------------------------------------
descriptionEnhancement:
  enabled: false

# -----------------------------------------------------------------------------
# Stateless reviewer: no memory-bank dir, no knowledge-base file, and no commits
# back to the repo (keeps the single-commit policy intact and needs no write
# access beyond posting the review).
# -----------------------------------------------------------------------------
memoryBank:
  enabled: false

knowledgeBase:
  enabled: false

memory:
  enabled: false
  autoCommit: false

# -----------------------------------------------------------------------------
# Cost / runtime guardrails
# -----------------------------------------------------------------------------
performance:
  maxReviewDuration: "15m"
  tokenBudget:
    maxTokensPerReview: 800000
    warningThreshold: 600000
