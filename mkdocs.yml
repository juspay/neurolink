site_name: "NeuroLink"
site_description: "Enterprise AI Development Platform with built-in tools, universal provider support, and factory pattern architecture. Production-ready with TypeScript support."
site_url: "https://juspay.github.io/neurolink"
repo_url: "https://github.com/juspay/neurolink"
repo_name: "juspay/neurolink"
edit_uri: "edit/release/docs/"

# Build settings
docs_dir: "docs"
# Use '_site' instead of the default 'site' directory for the following reasons:
# 1. Alignment with GitHub Pages deployment workflow expectations
# 2. Avoids potential conflicts with other static site generators and tools
# 3. Provides clear distinction for MkDocs-specific output directory
# 4. Follows modern convention for build artifacts separation
site_dir: "_site"

# The root docs/index.md is synced from README.md via sync-readme.sh

# Exclude TypeDoc-generated files that link to _media:
# - api/_media/: TypeDoc copies files linked from root README.md here (duplicates)
# - api/README.md: TypeDoc-generated from root README, has broken _media links
# The canonical docs are at their proper locations (sdk/, features/, guides/, etc.)
exclude_docs: |
  api/_media/**
  api/README.md

# Theme configuration
theme:
  name: material
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  # logo: assets/images/logo.png
  # favicon: assets/images/favicon.ico
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# Plugins
plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: Page contents
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: juspay
      repo: neurolink
  - pymdownx.mark
  - pymdownx.smartsymbols
  # The 'auto_append' option for pymdownx.snippets was intentionally removed to simplify configuration.
  # If your documentation previously relied on auto-appended snippets, you must now manually include those snippets in each Markdown file where needed.
  # Verified: No documentation files depend on auto-appended snippets. All required content is included manually.
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

